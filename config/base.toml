[project]
name = ""  # User fills in during setup
# Whether to include the BIDS session entity (ses-XX) in paths/filenames:
#   "auto" -> include only when some subject has >1 session; single-session
#             studies omit ses- entirely (matches BIDS convention)
#   true   -> always include;  false -> never include
use_sessions = "auto"

[paths]
bids_dir = ""              # Root BIDS dataset directory
sourcedata_dir = ""        # Where organized DICOMs live (usually <bids_dir>/sourcedata)
derivatives_dir = ""       # Usually <bids_dir>/derivatives
work_dir = "/tmp"          # Scratch for fMRIPrep etc. — node-local, outside BIDS tree
containers_dir = ""        # Singularity .sif/.simg images
nordic_toolbox_dir = ""    # Path to NORDIC_Raw MATLAB toolbox
fs_license = ""            # FreeSurfer license file path

[dcm_source]
# LCNI DICOM export location
base_dir = "/projects/lcni/dcm"
group = ""                 # e.g., "hulacon"
project = ""               # e.g., "mmmdata"

[conversion]
# Run the BIDS validator on the output once dcm2bids finishes (its own
# --bids_validate flag). The validator ships *inside* the dcm2bids container, so
# this costs nothing to enable and needs no extra install. Findings land in the
# SLURM log the cockpit already shows. Structural/naming problems only — it does
# not check semantic intent, so a clean run is not an all-clear (see TODO #15).
bids_validate = true

[containers]
dcm2bids_version = "3.2.0"
fmriprep_version = "24.1.1"
mriqc_version = "24.0.2"

[fmriprep]
output_spaces = ["MNI152NLin2009cAsym:res-2", "fsaverage6", "func"]
nprocs = 8
mem_gb = 32

[nordic]
magnitude_only = true
matlab_module = "matlab/R2024a"
excluded_nodes = ""
# Per-project toggle: when true, fMRIPrep reads the NORDIC-denoised BIDS tree
# (derivatives/nordic/bids_format) and depends on the `nordic` stage instead of
# `converted`. Set in a project's code/duckbrain.toml. NORDIC still runs as a
# pure producer regardless; this only redirects fMRIPrep's input.
use_nordic = false

[slurm]
# The two partition ROLES. A stage names its role (see `long` below), never a
# partition directly, so a site with different partition names sets these two
# keys once — in the user config or the project config — and every stage follows.
# `partition` was "medium" until 2026-07-22, but every stage overrode it with
# "compute", so it never reached a job; it is spelled "compute" now so removing
# those per-stage lines preserves exactly where jobs already land (TODO #17.2).
partition = "compute"
partition_long = "computelong"
time = "12:00:00"
memory = "16G"
cpus = "4"
email = ""
mail_type = "END,FAIL"
account = ""

[slurm.overrides.dcm2bids]
time = "03:00:00"
memory = "8G"
cpus = "1"

[slurm.overrides.mriqc]
time = "06:00:00"
# 32G allocation; MRIQC is handed --mem-gb 24 (alloc - 8 GB headroom) in
# _build_mriqc so its synthstrip overshoot stays inside the cgroup limit.
memory = "32G"
cpus = "4"

[slurm.overrides.nordic]
time = "02:00:00"
memory = "32G"
cpus = "4"

[slurm.overrides.fmriprep]
time = "48:00:00"
memory = "48G"
cpus = "8"
# The one long-running stage: takes [slurm] partition_long rather than partition.
long = true
