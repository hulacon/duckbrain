# The gate duckbrain went its first two releases without (TODO #18).
#
# Scope is deliberately the checks that can pass on a runner with no cluster:
# no SLURM, no Singularity, no /projects, no scanner data. Everything the test
# suite asserts about job submission it asserts against *rendered* text, which
# is exactly why that suite runs here at all. Live validation stays a Talapas
# job and a note in memory/ — CI cannot replace it and should not pretend to.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # The ends of the supported range. 3.10 is the requires-python floor;
      # 3.12 is where a deprecation lands before it becomes an error. Local dev
      # runs 3.11 in between, so all three get exercised somewhere.
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4
        # Provenance stamps `git describe` of the checkout, so the tag history
        # has to be present or anything touching it degrades differently here
        # than it does for a user.
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Import check
        # Cheap, and it catches the failure mode a test suite structurally can't:
        # the seven Streamlit pages are scripts, never imported by any test, so a
        # syntax error in one ships green. This is the only check in CI that
        # looks at them at all.
        #
        # Not `python -m compileall -q src/`: that prints "Can't list 'src/'" and
        # **exits 0** when the path is wrong, so the day the layout moves this
        # step keeps passing while checking nothing. Assert the pages are there
        # before trusting a green compile.
        run: |
          python -c "import duckbrain; print('duckbrain', duckbrain.__version__)"
          python - <<'PY'
          import compileall, pathlib, sys

          pages = sorted(pathlib.Path("src/duckbrain/gui/pages").glob("[0-9]*.py"))
          if not pages:
              sys.exit("no Streamlit pages found under src/duckbrain/gui/pages — layout moved?")
          print(f"compiling {len(pages)} pages + package")
          sys.exit(0 if compileall.compile_dir("src", quiet=1) else 1)
          PY

      - name: Lint
        run: ruff check .

      - name: Format
        run: ruff format --check .

      - name: Tests
        # --cov-fail-under lives in pyproject ([tool.coverage.report]) so a local
        # run and CI enforce the same floor.
        run: pytest tests/ -q --cov=duckbrain --cov-report=term-missing
